services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: proptrex
      POSTGRES_USER: proptrex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proptrex"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - internal

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://proptrex:${POSTGRES_PASSWORD:-changeme_strong_password}@postgres:5432/proptrex
      DB_SSL: "false"
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_TLS_REJECT: "false"
      MAIL_FROM: "PROPTREX <noreply@proptrex.com>"
      HCAPTCHA_SECRET: ${HCAPTCHA_SECRET}
      OTP_SALT: ${OTP_SALT}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      ADMIN_SECRET: ${ADMIN_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
